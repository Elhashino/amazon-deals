name: Deal Ingestion – Group B

on:
  schedule:
    # Group B runs at 2:00 PM UTC daily (grocery/pet/sports/baby/automotive/garden)
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  ingest-group-b:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6-hour hard cap (GitHub Actions limit)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          # Only 6 categories now so we can afford 5 pages within the time limit
          DEALS_PAGES_PER_ROOT_CATEGORY: '5'
          CATEGORY_GROUP: 'B'
          # Group B does the daily cleanup — deletes deals older than 25 hours
          PURGE_DEALS_ON_END: '1'
          PURGE_DEALS_ON_START: '0'
        run: python -m app.ingestion
